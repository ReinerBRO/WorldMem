defaults:
  - df_base

n_frames: ${dataset.n_frames}
frame_skip: ${dataset.frame_skip}
metadata: ${dataset.metadata}

# training hyperparameters
weight_decay: 2e-3
warmup_steps: 1000
optimizer_beta: [0.9, 0.99]
action_cond_dim: 25
use_plucker: true

# PTM integration is off by default to preserve the original WorldMem baseline.
use_ptm_memory: false
use_ptm_cross_attention: true
use_ptm_reference_adapter: false
video_log_stage: null
num_memory_tokens: 16
ptm_memory_dim: 1024
ptm_num_layers: 4
ptm_token_dropout: 0.0
ptm_loss_weight: 0.25
ptm_bottleneck_weight: 0.001
ptm_ablation: normal
ptm_max_history_candidates: 256
ptm_w_embed: 1.0
ptm_w_loop: 0.5
ptm_w_match: 0.5
ptm_w_landmark: 0.5
ptm_w_object: 0.5
generation_target_window_radius: 1
generation_late_horizon_start: 50
generation_target_loss_weight: 0.0
generation_late_loss_weight: 0.0

diffusion:
  # training
  beta_schedule: sigmoid
  objective: pred_v
  use_fused_snr: True
  cum_snr_decay: 0.96
  clip_noise: 20.
  # sampling
  sampling_timesteps: 20
  ddim_sampling_eta: 0.0
  stabilization_level: 15
  # architecture
  architecture:
    network_size: 64
    attn_heads: 4
    attn_dim_head: 64
    dim_mults: [1, 2, 4, 8]
    resolution: ${dataset.resolution}
    attn_resolutions: [16, 32, 64, 128]
    use_init_temporal_attn: True
    use_linear_attn: True
    time_emb_type: rotary

_name: df_video_worldmemminecraft
