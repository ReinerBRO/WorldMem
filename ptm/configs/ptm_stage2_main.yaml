data:
  out: ptm_minedojo_data/stage2
  num_episodes: 20000
  frames_per_episode: 192
  families: balanced
  backend: minedojo
  split: train
  seed: 1000
  height: 128
  width: 128
  history_length: 96
  future_length: 96

model:
  memory_dim: 1024
  num_memory_tokens: 16
  num_layers: 4
  token_dropout: 0.1

training:
  batch_size: 16
  epochs: 20
  lr: 0.0001
  output_dir: outputs/ptm_stage2

worldmem:
  use_ptm_memory: true
  ptm_loss_weight: 0.25
  freeze_vae: true
  adapter_train_only: true
